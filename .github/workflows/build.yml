name: Build

on:
  push:
    branches: [ master ]
    paths:
      - ".github/workflows/build.yml"
      - "build.py"
  pull_request:
    branches: [ master ]
    paths:
      - ".github/workflows/build.yml"
      - "build.py"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        clang-version: [ 22, 21, 20, 19, 18, 17, 16, 15, 14, 13, 12.0.1, 12, 11]
        os: [ linux, macosx, macos-intel, windows ]
        include:
          - clang-version: 22
            release: llvm-project-22.1.0.src
          - clang-version: 21
            release: llvm-project-21.1.0.src
          - clang-version: 20
            release: llvm-project-20.1.0.src
          - clang-version: 19
            release: llvm-project-19.1.0.src
          - clang-version: 18
            release: llvm-project-18.1.5.src
          - clang-version: 17
            release: llvm-project-17.0.6.src
          - clang-version: 16
            release: llvm-project-16.0.3.src
          - clang-version: 15
            release: llvm-project-15.0.2.src
          - clang-version: 14
            release: llvm-project-14.0.0.src
          - clang-version: 13
            release: llvm-project-13.0.0.src
          - clang-version: 12.0.1
            release: llvm-project-12.0.1.src
          - clang-version: 12
            release: llvm-project-12.0.0.src
          - clang-version: 11
            release: llvm-project-11.1.0.src
          - os: linux
            runner: ubuntu-22.04
            arch: amd64
          - os: macosx
            runner: macos-latest
            arch: arm64
          - os: macos-intel
            runner: macos-15-intel
            arch: amd64
          - os: windows
            runner: windows-latest
            arch: amd64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE: '${{ matrix.release }}'
      suffix: '${{ matrix.clang-version }}_${{ matrix.os }}-${{ matrix.arch }}'
    steps:
    - name: Download build script and patches
      # We download a tarball of this repo, as the presence of a .git directory leaks
      # The commit hash of this repository into the clang binaries
      shell: bash
      run: curl -L https://github.com/${{ github.repository }}/archive/${{ github.ref }}.tar.gz | tar xvz --strip 1
    - name: Build
      shell: bash
      run: python3 build.py --version "${{ matrix.clang-version }}" --os ${{ matrix.os }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: clang-tools-${{ matrix.release }}-${{ env.suffix }}
        path: "${{ matrix.release }}/build/**/clang-*-${{ env.suffix }}*"
        # ** covers both bin/ (Linux/macOS) and MinSizeRel/bin/ (Windows)
        retention-days: 1
  test-release:
    permissions: {}
    strategy:
      matrix:
        os: [ linux, macosx, macos-intel, windows ]
        include:
          - os: linux
            runner: ubuntu-22.04
            arch: amd64
          - os: macosx
            runner: macos-latest # ARM64 Apple Silicon runner
            arch: arm64
          - os: macos-intel
            runner: macos-15-intel # Intel x86_64 runner
            arch: amd64
          - os: windows
            runner: windows-latest
            arch: amd64
    runs-on: ${{ matrix.runner }}
    needs: build
    env:
      suffix: '_${{ matrix.os }}-${{ matrix.arch }}'
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '**/*${{ env.suffix }}'
      - name: List files (macos, linux)
        if: ${{ matrix.os == 'macosx' || matrix.os == 'macos-intel' || matrix.os == 'linux' }}
        run: ls -laR artifacts/
      - name: Smoke test each clang tool (macos, linux)
        if: ${{ matrix.os == 'macosx' || matrix.os == 'macos-intel' || matrix.os == 'linux' }}
        run: |
          cd artifacts
          # From the artifacts directory, loop over each executable
          # (not .sha512sum files) and
          # invoke the --version command to verify

          for tool in $(find . -type f); do
            # Skip the sha512sum files
            if [[ $tool == *.sha512sum ]]; then
              continue
            fi
            chmod +x $tool
            # Run the tool with --version and print the output
            echo "Running $tool --version"
            $tool --version
          done
      - name: List files (Windows)
        if: ${{ matrix.os == 'windows' }}
        run: |
          Get-ChildItem -Recurse artifacts | Format-List

      - name: Smoke test each clang tool (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          Set-Location artifacts

          # Find all files excluding *.sha512sum
          $tools = Get-ChildItem -Recurse -File | Where-Object { $_.Name -notlike '*.sha512sum' }

          foreach ($tool in $tools) {
              # Ensure the file is executable
              $toolPath = $tool.FullName

              # Print which tool is being run
              Write-Host "Running $toolPath --version"

              try {
                  # Attempt to run the tool with --version
                  & $toolPath --version
              } catch {
                  Write-Host "Failed to run $toolPath --version. Error: $_"
              }
          }
  draft-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get short SHA
        id: get-sha
        run: echo "short_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v8
      - name: List files
        run: ls -laR .
      - name: Workaround - delete all files over 2G, above github release file upload limit
        run: find . -type f -size +2G -exec rm -v {} \;
      - name: Draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: "master-${{ steps.get-sha.outputs.short_sha }}"
          release_name: "master-${{ steps.get-sha.outputs.short_sha }}"
          draft: true
          file_glob: true
          file: clang-*/**/*
